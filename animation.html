<svg width="680" height="440" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="svg-elem-1"></path></marker></defs>

<text x="340" y="32" text-anchor="middle" style="fill:rgb(250, 249, 245);stroke:none;font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">LSM Tree write pipeline</text>

<!-- Step 1: Incoming writes -->
<g>
<rect x="40" y="60" width="130" height="44" rx="8" stroke-width="0.5" style="stroke: rgb(239, 159, 39);" class="svg-elem-2"></rect>
<text x="105" y="82" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 199, 117);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">Incoming writes</text>
</g>

<line x1="170" y1="82" x2="210" y2="82" marker-end="url(#arrow)" style="stroke: rgb(156, 154, 146); stroke-width: 1.5px;" class="svg-elem-3"></line>

<!-- Step 2: Write-Ahead Log -->
<g>
<rect x="215" y="60" width="130" height="44" rx="8" stroke-width="0.5" style="stroke: rgb(180, 178, 169);" class="svg-elem-4"></rect>
<text x="280" y="76" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">Write-ahead log</text>
<text x="280" y="94" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Durability backup</text>
</g>

<line x1="345" y1="82" x2="385" y2="82" marker-end="url(#arrow)" style="stroke: rgb(156, 154, 146); stroke-width: 1.5px;" class="svg-elem-5"></line>

<!-- Step 3: MemTable -->
<g>
<rect x="390" y="52" width="250" height="60" rx="12" stroke-width="0.5" style="stroke: rgb(93, 202, 165);" class="svg-elem-6"></rect>
<text x="515" y="72" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">MemTable (in memory)</text>
<text x="515" y="92" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Sorted in-memory buffer — fast!</text>
</g>

<!-- Flush arrow -->
<line x1="515" y1="112" x2="515" y2="160" marker-end="url(#arrow)" style="stroke: rgb(156, 154, 146); stroke-width: 1.5px;" class="svg-elem-7"></line>
<text x="540" y="142" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Flush when full</text>

<!-- SSTables on disk -->
<rect x="100" y="170" width="480" height="250" rx="16" fill="none" stroke-width="0.5" stroke-dasharray="6 4" style="stroke: rgba(222, 220, 209, 0.3);" class="svg-elem-8"></rect>
<text x="120" y="194" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">On disk (sequential writes)</text>

<!-- SSTable L0 -->
<g>
<rect x="130" y="210" width="420" height="40" rx="8" stroke-width="0.5" style="stroke: rgb(175, 169, 236);" class="svg-elem-9"></rect>
<text x="340" y="224" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">SSTable L0 (newest)</text>
<text x="340" y="242" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">ali, usop, zach — sorted, immutable</text>
</g>

<!-- SSTable L1 -->
<g>
<rect x="130" y="262" width="420" height="40" rx="8" stroke-width="0.5" opacity="0.7" style="stroke: rgb(175, 169, 236);" class="svg-elem-10"></rect>
<text x="340" y="276" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">SSTable L1</text>
<text x="340" y="294" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Earlier flushed data, also sorted</text>
</g>

<!-- SSTable L2 -->
<g>
<rect x="130" y="314" width="420" height="40" rx="8" stroke-width="0.5" opacity="0.45" style="stroke: rgb(175, 169, 236);" class="svg-elem-11"></rect>
<text x="340" y="328" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:14px;font-weight:500">SSTable L2 (oldest)</text>
<text x="340" y="346" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Compacted from older SSTables</text>
</g>

<!-- Read amplification callout -->
<g>
<rect x="130" y="374" width="420" height="36" rx="8" stroke-width="0.5" style="stroke: rgb(240, 153, 123);" class="svg-elem-12"></rect>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240, 153, 123);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400">Read = must check MemTable + L0 + L1 + L2 (read amplification tax)</text>
</g>
</svg>
